name: Cross Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: 0
        run: go build ./cmd/locallens

      - name: Verify Windows release build
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: 0
        run: go build -ldflags "-H windowsgui" -o locallens.exe ./cmd/locallens

      - name: Run unit tests
        env:
          CGO_ENABLED: 0
        run: go test -timeout 15s -v -count=1 ./internal/...