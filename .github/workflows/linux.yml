name: Linux

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify build
        run: |
          CGO_ENABLED=0 go build ./cmd/locallens

      - name: Run unit tests
        run: |
          make test-unit